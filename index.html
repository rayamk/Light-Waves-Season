<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Waves Season</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a4e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #f0e68c, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .sub {
            font-size: 1.3rem;
            color: #aac7ff;
            margin-bottom: 25px;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            margin: 15px auto 25px;
            border-radius: 10px;
        }
        p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cfdfff;
            margin-bottom: 30px;
        }
        .status {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            background: rgba(255,215,0,0.15);
            border: 1px solid #ffd700;
            color: #ffd700;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #6688cc;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 20px;
        }
        .footer span {
            color: #ffd700;
        }
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .sub { font-size: 1rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Light Waves</h1>
        <div class="sub">✦ Season 1 ✦</div>
        <div class="divider"></div>
        <p>
            ပြန်စပြီ။<br>
            တစ်ဆင့်ချင်း အောင်မယ်။<br>
            နောက်တစ်ဆင့်တက်မယ်။
        </p>
        <div class="status">✅ LIVE · Deployed on Vercel</div>
        <div class="footer">
            <span>⚡</span> rayamk · <span>✦</span> 2026
        </div>
    </div>
</body>
</html>
